name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [server, client]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  unit-test:
    name: Unit Tests
    needs: [lint-typecheck]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [server, client]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json
      - run: npm ci
      - run: npm run test:run

  integration-test:
    name: Integration Tests
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./server/package-lock.json
      - run: npm ci
        working-directory: ./server
      - run: npm run test:run -- test/integration/
        working-directory: ./server
