version: "3.9"

services:
  db:
    image: postgis/postgis:14-3.4
    container_name: webgis-store-db
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      POSTGRES_DB: webgis_store
      POSTGRES_USER: webgis_store
      POSTGRES_PASSWORD: webgis_store_pass
    ports:
      - "5432:5432"
    volumes:
      - webgis-store-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webgis_store -d webgis_store"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: webgis-store-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgres://webgis_store:webgis_store_pass@db:5432/webgis_store
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node dist/migrate.js && node dist/app.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: webgis-store-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  webgis-store-pgdata:
